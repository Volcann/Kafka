<!DOCTYPE html>
<html>
<head>
    <title>Neon Sentiment Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        :root {
            --bg-color: #0a0b10;
            --card-bg: #161b22;
            --neon-happy: #00ff88;
            --neon-sad: #00d4ff;
            --neon-angry: #ff0055;
        }

        body { 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            text-align: center; 
            background-color: var(--bg-color); 
            color: #ffffff; 
            margin: 0;
            padding-top: 50px;
        }

        h1 { font-weight: 300; letter-spacing: 2px; text-transform: uppercase; color: #fff; }
        p { color: #8b949e; margin-bottom: 40px; }

        .dashboard { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; }

        .count-box { 
            background: var(--card-bg); 
            padding: 40px; 
            border-radius: 20px; 
            width: 180px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        /* Neon Specific Styles */
        #happy { color: var(--neon-happy); }
        #sad { color: var(--neon-sad); }
        #angry { color: var(--neon-angry); }

        .number { display: block; font-size: 48px; margin-top: 15px; font-weight: 800; color: #fff; }

        /* Update Animation Class */
        .flash-happy { animation: neon-pulse-happy 0.6s ease-out; }
        .flash-sad { animation: neon-pulse-sad 0.6s ease-out; }
        .flash-angry { animation: neon-pulse-angry 0.6s ease-out; }

        @keyframes neon-pulse-happy {
            0% { box-shadow: 0 0 0px var(--neon-happy); transform: scale(1); }
            50% { box-shadow: 0 0 30px var(--neon-happy); transform: scale(1.05); }
            100% { box-shadow: 0 0 0px var(--neon-happy); transform: scale(1); }
        }

        @keyframes neon-pulse-sad {
            0% { box-shadow: 0 0 0px var(--neon-sad); transform: scale(1); }
            50% { box-shadow: 0 0 30px var(--neon-sad); transform: scale(1.05); }
            100% { box-shadow: 0 0 0px var(--neon-sad); transform: scale(1); }
        }

        @keyframes neon-pulse-angry {
            0% { box-shadow: 0 0 0px var(--neon-angry); transform: scale(1); }
            50% { box-shadow: 0 0 30px var(--neon-angry); transform: scale(1.05); }
            100% { box-shadow: 0 0 0px var(--neon-angry); transform: scale(1); }
        }
    </style>
</head>
<body>
    <h1>Sentiment Analytics Live</h1>
    <p>Real-time data stream</p>
    
    <div class="dashboard">
        <div class="count-box" id="happy">
            HAPPY
            <span class="number" id="happy-count">0</span>
        </div>
        <div class="count-box" id="sad">
            SAD
            <span class="number" id="sad-count">0</span>
        </div>
        <div class="count-box" id="angry">
            ANGRY
            <span class="number" id="angry-count">0</span>
        </div>
    </div>

    <script>
        var socket = io();

        function triggerFlash(id, className) {
            const el = document.getElementById(id);
            el.classList.remove(className);
            void el.offsetWidth; // Trigger reflow to restart animation
            el.classList.add(className);
        }

        socket.on('update_counts', function(msg) {
            // Update numbers
            document.getElementById('happy-count').innerText = msg.Happy || 0;
            document.getElementById('sad-count').innerText = msg.Sad || 0;
            document.getElementById('angry-count').innerText = msg.Angry || 0;

            // Trigger neon flash animations
            triggerFlash('happy', 'flash-happy');
            triggerFlash('sad', 'flash-sad');
            triggerFlash('angry', 'flash-angry');
        });
    </script>
</body>
</html>
