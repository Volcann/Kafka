<!DOCTYPE html>
<html>
<head>
    <title>Neon Sentiment Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0d0e12;
            --card-bg: #1a1c23;
            --neon-green: #39ff14;
            --neon-blue: #00d4ff;
            --neon-red: #ff3131;
            --neon-yellow: #faff00;
        }

        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            text-align: center; 
            background-color: var(--bg); 
            color: #eee; 
            margin: 0;
            padding-top: 50px;
        }

        h1 { font-weight: 300; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 5px; }
        .subtitle { color: #888; margin-bottom: 40px; font-size: 0.9em; }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }

        .count-box { 
            background: var(--card-bg); 
            padding: 25px; 
            border-radius: 12px; 
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.2s ease;
            position: relative;
        }

        .label { font-size: 14px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; display: block; }
        .number { display: block; font-size: 36px; font-weight: 900; color: #fff; }

        #happy .label { color: var(--neon-green); }
        #sad .label { color: var(--neon-blue); }
        #angry .label { color: var(--neon-red); }

        .chart-container {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            height: 300px;
        }

        .activity-feed {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            text-align: left;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .feed-title { font-size: 14px; text-transform: uppercase; color: #555; margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 5px; }

        .message-item {
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            animation: fadeIn 0.4s ease-out;
            font-size: 14px;
        }

        .msg-user { font-weight: bold; color: var(--neon-blue); }
        .msg-emotion { font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 10px; text-transform: uppercase; }
        .emo-happy { background: rgba(57, 255, 20, 0.1); color: var(--neon-green); border: 1px solid var(--neon-green); }
        .emo-sad { background: rgba(0, 212, 255, 0.1); color: var(--neon-blue); border: 1px solid var(--neon-blue); }
        .emo-angry { background: rgba(255, 49, 49, 0.1); color: var(--neon-red); border: 1px solid var(--neon-red); }

        .btn-reset {
            background: transparent;
            border: 1px solid var(--neon-red);
            color: var(--neon-red);
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 20px;
            font-size: 12px;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .btn-reset:hover { background: var(--neon-red); color: white; box-shadow: 0 0 15px var(--neon-red); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        /* Neon Pulse Animations */
        .update-happy { animation: pulse-green 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .update-sad { animation: pulse-blue 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .update-angry { animation: pulse-red 0.6s cubic-bezier(0.4, 0, 0.2, 1); }

        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(57, 255, 20, 0); }
            50% { box-shadow: 0 0 20px rgba(57, 255, 20, 0.4); border-color: var(--neon-green); }
            100% { box-shadow: 0 0 0 0 rgba(57, 255, 20, 0); }
        }
        @keyframes pulse-blue {
            0% { box-shadow: 0 0 0 0 rgba(0, 212, 255, 0); }
            50% { box-shadow: 0 0 20px rgba(0, 212, 255, 0.4); border-color: var(--neon-blue); }
            100% { box-shadow: 0 0 0 0 rgba(0, 212, 255, 0); }
        }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(255, 49, 49, 0); }
            50% { box-shadow: 0 0 20px rgba(255, 49, 49, 0.4); border-color: var(--neon-red); }
            100% { box-shadow: 0 0 0 0 rgba(255, 49, 49, 0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sentiment Stream</h1>
        <div class="subtitle">Real-time Kafka message analysis</div>

        <div class="dashboard">
            <div class="count-box" id="happy">
                <span class="label">Happy</span>
                <span class="number" id="happy-count">0</span>
            </div>
            <div class="count-box" id="sad">
                <span class="label">Sad</span>
                <span class="number" id="sad-count">0</span>
            </div>
            <div class="count-box" id="angry">
                <span class="label">Angry</span>
                <span class="number" id="angry-count">0</span>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="sentimentChart"></canvas>
        </div>

        <div class="activity-feed" id="feed">
            <div class="feed-title">Recent Activity</div>
            <div id="message-list"></div>
        </div>

        <button class="btn-reset" onclick="resetStats()">Reset Dashboard</button>
    </div>

    <script>
        var socket = io();
        
        // Chart Setup
        const ctx = document.getElementById('sentimentChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Happy', 'Sad', 'Angry'],
                datasets: [{
                    label: 'Sentiment Distribution',
                    data: [0, 0, 0],
                    backgroundColor: ['#39ff1488', '#00d4ff88', '#ff313188'],
                    borderColor: ['#39ff14', '#00d4ff', '#ff3131'],
                    borderWidth: 1
                }]
            },
            options: {
                maintainAspectRatio: false,
                scales: {
                    y: { beginAtZero: true, grid: { color: '#ffffff11' }, ticks: { color: '#888' } },
                    x: { grid: { display: false }, ticks: { color: '#888' } }
                },
                plugins: { legend: { display: false } }
            }
        });

        // Helper to trigger the animation
        function animateBox(id, pulseClass) {
            const el = document.getElementById(id);
            if (!el) return;
            el.classList.remove(pulseClass);
            void el.offsetWidth; 
            el.classList.add(pulseClass);
        }

        socket.on('update_counts', function(msg) {
            document.getElementById('happy-count').innerText = msg.Happy || 0;
            document.getElementById('sad-count').innerText = msg.Sad || 0;
            document.getElementById('angry-count').innerText = msg.Angry || 0;

            chart.data.datasets[0].data = [msg.Happy || 0, msg.Sad || 0, msg.Angry || 0];
            chart.update();

            if (msg.lastUpdate) {
                animateBox(msg.lastUpdate.toLowerCase(), 'update-' + msg.lastUpdate.toLowerCase());
            }
        });

        socket.on('new_message', function(data) {
            const list = document.getElementById('message-list');
            const item = document.createElement('div');
            item.className = 'message-item';
            
            const timestamp = new Date().toLocaleTimeString();
            item.innerHTML = `
                <span style="color: #444; font-size: 11px;">${timestamp}</span>
                <span class="msg-user">@${data.user}</span>: 
                <span class="msg-text">"${data.text}"</span>
                <span class="msg-emotion emo-${data.emotion.toLowerCase()}">${data.emotion}</span>
            `;
            
            list.prepend(item);
            if (list.children.length > 5) {
                list.removeChild(list.lastChild);
            }

            // Also trigger pulse on new message
            animateBox(data.emotion.toLowerCase(), 'update-' + data.emotion.toLowerCase());
        });

        function resetStats() {
            fetch('/api/reset', { method: 'POST' });
            document.getElementById('message-list').innerHTML = '';
        }
    </script>
</body>
</html>
